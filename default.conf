server {
    listen 80;
    server_name localhost;

    # 1. Backend API İstekleri (/api ile başlayan tüm istekler doğrudan Node.js backend'e gider)
    location /api/ {
        proxy_pass http://vocabase-api:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Frontend SPA (Single Page Application) Routing Fallback
    # F5 (Yenileme) yapldğnda veya doğrudan /login, /register URL'si girildiğinde Nginx'in 404 vermeyip index.html'e yönlendirmesi için!
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
