server {
    listen 80;
    server_name localhost;

    # 1. Backend API İstekleri (/api ile başlayan tüm istekler doğrudan Node.js backend'e gider)
    location /api/ {
        proxy_pass http://vocabase-api:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Frontend SPA ve Statik Dosyalar Node.js Express tarafından servis edilir (/dist)
    location / {
        proxy_pass http://vocabase-api:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
