services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-yeryesil_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-GizliSifre123!}
      POSTGRES_DB: ${DB_NAME:-vocabase_db}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - webnetwork

  vocabase-api:
    build: .
    container_name: vocabase-api-container
    restart: unless-stopped
    depends_on:
      - postgres-db
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-yeryesil_admin}
      - DB_PASSWORD=${DB_PASSWORD:-GizliSifre123!}
      - DB_NAME=${DB_NAME:-vocabase_db}
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-this-in-production}
    ports:
      - "5000:5000"
    networks:
      - webnetwork

  vocabase-app:
    image: nginx:alpine
    container_name: vocabase-container
    restart: unless-stopped
    depends_on:
      - vocabase-api
    ports:
      - "3001:80"
      - "8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - webnetwork

networks:
  webnetwork:
    driver: bridge
